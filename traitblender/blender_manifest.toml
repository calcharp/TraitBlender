# Static parts of the extension manifest. Wheels and [dependencies] are
# generated by build_zips/generate_manifest.py from the platform wheels dir.
schema_version = "1.0.0"

id = "traitblender"
version = "2.1.0"
name = "TraitBlender"
tagline = "Generate museum-style images for morphological datasets"
maintainer = "Caleb Charpentier <calebcharpentier00@gmail.com>"
type = "add-on"

# Blender 5.1+ ships Python 3.13; bundled wheels must be cp313 (see requirements-wheels*.txt).
blender_version_min = "5.1.0"

license = [
  "SPDX:MIT",
]

website = "https://github.com/Imageomics/TraitBlender"

wheels = [
  "./wheels/dearpygui-2.0.0-cp313-cp313-win_amd64.whl",
  "./wheels/et_xmlfile-2.0.0-py3-none-any.whl",
  "./wheels/numpy-2.2.6-cp313-cp313-win_amd64.whl",
  "./wheels/openpyxl-3.1.5-py2.py3-none-any.whl",
  "./wheels/pandas-2.2.3-cp313-cp313-win_amd64.whl",
  "./wheels/pillow-11.2.1-cp313-cp313-win_amd64.whl",
  "./wheels/python_dateutil-2.9.0.post0-py2.py3-none-any.whl",
  "./wheels/pytz-2026.1.post1-py2.py3-none-any.whl",
  "./wheels/PyYAML-6.0.2-cp313-cp313-win_amd64.whl",
  "./wheels/scipy-1.16.0-cp313-cp313-win_amd64.whl",
  "./wheels/six-1.17.0-py2.py3-none-any.whl",
  "./wheels/tzdata-2026.1-py2.py3-none-any.whl",
]


[dependencies]
PyYAML = "./wheels/PyYAML-6.0.2-cp313-cp313-win_amd64.whl"
dearpygui = "./wheels/dearpygui-2.0.0-cp313-cp313-win_amd64.whl"
et_xmlfile = "./wheels/et_xmlfile-2.0.0-py3-none-any.whl"
numpy = "./wheels/numpy-2.2.6-cp313-cp313-win_amd64.whl"
openpyxl = "./wheels/openpyxl-3.1.5-py2.py3-none-any.whl"
pandas = "./wheels/pandas-2.2.3-cp313-cp313-win_amd64.whl"
pillow = "./wheels/pillow-11.2.1-cp313-cp313-win_amd64.whl"
python_dateutil = "./wheels/python_dateutil-2.9.0.post0-py2.py3-none-any.whl"
pytz = "./wheels/pytz-2026.1.post1-py2.py3-none-any.whl"
scipy = "./wheels/scipy-1.16.0-cp313-cp313-win_amd64.whl"
six = "./wheels/six-1.17.0-py2.py3-none-any.whl"
tzdata = "./wheels/tzdata-2026.1-py2.py3-none-any.whl"


[permissions]
files = "Needed for reading trait data, assets, and morphospace models"

