# Static parts of the extension manifest. Wheels and [dependencies] are
# generated by build_zips/generate_manifest.py from the platform wheels dir.
schema_version = "1.0.0"

id = "traitblender"
version = "2.1.0"
name = "TraitBlender"
tagline = "Generate museum-style images for morphological datasets"
maintainer = "Caleb Charpentier <calebcharpentier00@gmail.com>"
type = "add-on"

# Blender 5.1+ ships Python 3.13; bundled wheels must be cp313 (see requirements-wheels*.txt).
blender_version_min = "5.1.0"

license = [
  "SPDX:MIT",
]

website = "https://github.com/Imageomics/TraitBlender"

# --- wheels and [dependencies] are injected by generate_manifest.py ---

[permissions]
files = "Needed for reading trait data, assets, and morphospace models"

