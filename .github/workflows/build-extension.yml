# Build TraitBlender extension for Windows and Linux (Blender 4.3).
# Assembles addon + platform wheels and a generated manifest per job.
# On tag push (v*), creates a GitHub Release with the built zips for README download links.
name: Build extension

on:
  push:
    branches:
      - v2
    tags:
      - 'v*'
    paths:
      - 'TraitBlender/**'
      - 'traitblender/**'
      - 'wheels/**'
      - 'packaging/**'
      - '.github/workflows/build-extension.yml'
  pull_request:
    branches:
      - v2
    paths:
      - 'TraitBlender/**'
      - 'traitblender/**'
      - 'wheels/**'
      - 'packaging/**'
      - '.github/workflows/build-extension.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Blender 4.3
        uses: bradyajohnston/setup-blender@v5
        with:
          version: "4.3"

      - name: Assemble build directory
        run: |
          New-Item -ItemType Directory -Path build_traitblender -Force
          Copy-Item -Path TraitBlender\* -Destination build_traitblender\ -Recurse -Force
          New-Item -ItemType Directory -Path build_traitblender\wheels -Force
          Copy-Item -Path wheels\windows\*.whl -Destination build_traitblender\wheels\

      - name: Generate manifest
        run: python packaging/generate_manifest.py build_traitblender/wheels --output build_traitblender/blender_manifest.toml

      - name: Build extension
        run: blender --command extension build --source-dir build_traitblender

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: traitblender-windows-x86_64
          path: "**/traitblender-2.0.0.zip"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Blender 4.3
        uses: bradyajohnston/setup-blender@v5
        with:
          version: "4.3"

      - name: Assemble build directory
        run: |
          mkdir -p build_traitblender/wheels
          cp -r TraitBlender/* build_traitblender/
          cp wheels/linux/*.whl build_traitblender/wheels/

      - name: Generate manifest
        run: python3 packaging/generate_manifest.py build_traitblender/wheels --output build_traitblender/blender_manifest.toml

      - name: Build extension
        run: blender --command extension build --source-dir build_traitblender

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: traitblender-linux-x86_64
          path: "**/traitblender-2.0.0.zip"

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: traitblender-windows-x86_64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: traitblender-linux-x86_64

      - name: Prepare release assets
        run: |
          mv traitblender-windows-x86_64/traitblender-2.0.0.zip traitblender-windows-x86_64.zip
          mv traitblender-linux-x86_64/traitblender-2.0.0.zip traitblender-linux-x86_64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            traitblender-windows-x86_64.zip
            traitblender-linux-x86_64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
