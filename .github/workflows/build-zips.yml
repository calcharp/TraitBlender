name: Build extension zips

on:
  push:
    branches: [main, dev]
    paths:
      - "traitblender/**"
      - "wheels/**"
      - "build_zips/**"
      - "requirements-wheels.txt"
      - "requirements-wheels-headless.txt"
      - ".github/workflows/build-zips.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "traitblender/**"
      - "wheels/**"
      - "build_zips/**"
      - "requirements-wheels.txt"
      - "requirements-wheels-headless.txt"
      - ".github/workflows/build-zips.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            wheels: traitblender/wheels
            artifact: traitblender-windows
            download_wheels: false
          - os: macos-latest
            wheels: wheels/mac
            artifact: traitblender-mac
            download_wheels: true
            requirements: requirements-wheels.txt
          - os: ubuntu-latest
            wheels: wheels/linux
            artifact: traitblender-linux
            download_wheels: true
            requirements: requirements-wheels.txt
          - os: ubuntu-latest
            wheels: wheels/linux-headless
            artifact: traitblender-linux-headless
            download_wheels: true
            requirements: requirements-wheels-headless.txt

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13 (must match Blender's embedded Python for wheels)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Blender 5.1
        uses: bradyajohnston/setup-blender@v5
        with:
          version: "5.1"

      - name: Download wheels for this OS
        if: ${{ matrix.download_wheels }}
        run: >-
          python -m pip download --only-binary=:all: -r "${{ matrix.requirements }}" -d "${{ matrix.wheels }}"

      - name: Build extension zip
        run: python build_zips/build_extension.py --wheels "${{ matrix.wheels }}"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: "traitblender-*.zip"

